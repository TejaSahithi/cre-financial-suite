
[functions.save-security-questions]
enabled = true
verify_jwt = true
import_map = "./functions/save-security-questions/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/save-security-questions/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/save-security-questions/*.html" ]

# invite-user verifies the caller's JWT inside the function (see index.ts),
# so we disable the gateway-level check. Otherwise the gateway 401s before
# the function ever runs, and the client only sees a generic
# "Edge Function returned a non-2xx status code" error.
[functions.invite-user]
enabled = true
verify_jwt = false

